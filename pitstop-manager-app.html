<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PitStop Manager</title>
<meta name="description" content="Gestion de ton parc auto : entretiens, échéances, consommation et finances.">
<meta name="theme-color" content="#09090C">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PitStop">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#09090C;--bg-1:#101215;--bg-2:#17191F;--bg-3:#1E2129;--bg-4:#252931;--bg-5:#2E323C;
    --accent:#F0521A;--accent-dim:rgba(240,82,26,0.13);
    --ok:#22C55E;--ok-dim:rgba(34,197,94,0.12);
    --warn:#F59E0B;--warn-dim:rgba(245,158,11,0.12);
    --danger:#EF4444;--danger-dim:rgba(239,68,68,0.12);
    --info:#60A5FA;--info-dim:rgba(96,165,250,0.12);
    --t1:#E8ECF2;--t2:#9AA4B2;--t3:#596070;
    --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.10);--b3:rgba(255,255,255,0.16);
    --f-display:'Barlow Condensed',sans-serif;--f-body:'DM Sans',sans-serif;--f-data:'JetBrains Mono',monospace;
    --r-sm:8px;--r-md:12px;--r-lg:16px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#000;font-family:var(--f-body);color:var(--t1);display:flex;justify-content:center;height:100vh;height:100dvh;overflow:hidden;}
  .app{width:100%;background:var(--bg-0);height:100vh;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;}
  #shell{flex:1;min-height:0;display:flex;}

  .header{padding:18px 20px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
  .header-title{font-family:var(--f-display);font-size:26px;font-weight:700;letter-spacing:0.04em;color:var(--t1);line-height:1;}
  .header-sub{font-size:12px;color:var(--t2);margin-top:4px;}
  .header-btn{width:38px;height:38px;background:var(--accent);border:none;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}

  .view{flex:1;min-height:0;overflow-y:auto;padding:0 16px 24px;-webkit-overflow-scrolling:touch;}
  .view::-webkit-scrollbar{width:0;}

  .nav{display:flex;border-top:1px solid var(--b1);background:var(--bg-1);padding:9px 0 16px;flex-shrink:0;}
  .nav-item{flex:1;text-align:center;cursor:pointer;padding:3px;background:none;border:none;font-family:var(--f-body);}
  .nav-item svg{display:block;margin:0 auto 3px;}
  .nav-label{font-size:10px;font-weight:500;color:var(--t3);}
  .nav-item.active .nav-label{color:var(--accent);}

  .sec-title{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--t3);font-weight:500;margin:24px 4px 12px;display:flex;justify-content:space-between;align-items:center;}
  .sec-title:first-child{margin-top:16px;}
  .sec-link{color:var(--accent);font-size:11px;font-weight:500;cursor:pointer;text-transform:none;letter-spacing:0;}

  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .stat{background:var(--bg-2);border:1px solid var(--b1);border-radius:var(--r-md);padding:14px 16px;}
  .stat-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
  .stat-val{font-family:var(--f-display);font-size:28px;font-weight:700;letter-spacing:0.02em;color:var(--t1);line-height:1;}
  .stat-val .unit{font-size:13px;color:var(--t3);font-weight:600;margin-left:3px;}
  .stat-label{font-size:11px;color:var(--t2);margin-top:4px;}

  .row{display:flex;align-items:center;gap:11px;padding:12px 13px;background:var(--bg-2);border:1px solid var(--b1);border-bottom:none;}
  .row:first-of-type{border-radius:var(--r-md) var(--r-md) 0 0;}
  .row:last-of-type{border-radius:0 0 var(--r-md) var(--r-md);border-bottom:1px solid var(--b1);}
  .row.solo{border-radius:var(--r-md);border-bottom:1px solid var(--b1);}
  .row.tap{cursor:pointer;}
  .row.tap:active{background:var(--bg-3);}
  .row-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .row-body{flex:1;min-width:0;}
  .row-name{font-size:13px;font-weight:500;color:var(--t1);}
  .row-sub{font-family:var(--f-data);font-size:10px;color:var(--t3);margin-top:2px;}
  .row-meta{text-align:right;flex-shrink:0;}
  .row-when{font-family:var(--f-data);font-size:11px;font-weight:500;margin-top:4px;}

  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap;}
  .badge .dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
  .badge.ok{background:var(--ok-dim);color:var(--ok);}.badge.ok .dot{background:var(--ok);}
  .badge.warn{background:var(--warn-dim);color:var(--warn);}.badge.warn .dot{background:var(--warn);}
  .badge.danger{background:var(--danger-dim);color:var(--danger);}.badge.danger .dot{background:var(--danger);}
  .badge.info{background:var(--info-dim);color:var(--info);}.badge.info .dot{background:var(--info);}
  .badge.sale{background:var(--accent-dim);color:var(--accent);}.badge.sale .dot{background:var(--accent);}
  .badge.sold{background:var(--bg-4);color:var(--t2);border:1px solid var(--b1);}

  .veh{background:var(--bg-2);border:1px solid var(--b1);border-radius:var(--r-lg);overflow:hidden;margin-bottom:12px;}
  .veh.s-accent{border-left:3px solid var(--accent);}
  .veh.s-ok{border-left:3px solid var(--ok);}
  .veh.s-warn{border-left:3px solid var(--warn);}
  .veh.s-danger{border-left:3px solid var(--danger);}
  .veh.s-sale{border-left:3px solid var(--accent);}
  .veh.s-sold{opacity:0.55;border-left:3px solid var(--t3);}
  .veh-head{padding:14px 16px 11px;display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer;}
  .veh-brand{font-family:var(--f-display);font-size:22px;font-weight:700;letter-spacing:0.04em;color:var(--t1);line-height:1;margin-bottom:3px;}
  .veh-model{font-size:12px;color:var(--t2);font-weight:500;}
  .veh-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
  .tag-pill{background:var(--bg-4);border:1px solid var(--b1);border-radius:5px;padding:2px 7px;font-size:10px;color:var(--t2);font-weight:600;letter-spacing:0.02em;}
  .garage-tools{margin-bottom:14px;}
  .garage-search{width:100%;background:var(--bg-2);border:1px solid var(--b2);border-radius:var(--r-md);padding:11px 13px;color:var(--t1);font-family:var(--f-body);font-size:13px;outline:none;}
  .garage-search:focus{border-color:var(--accent);}
  .garage-search::placeholder{color:var(--t3);}
  .veh-right{display:flex;flex-direction:column;align-items:flex-end;gap:9px;}
  .veh-plate{background:var(--accent-dim);border:1px solid rgba(240,82,26,0.18);border-radius:6px;padding:3px 8px;font-family:var(--f-data);font-size:10px;color:var(--accent);font-weight:500;white-space:nowrap;}
  .veh-cat{background:var(--bg-4);border:1px solid var(--b1);border-radius:6px;padding:3px 8px;font-size:10px;color:var(--t2);font-weight:500;white-space:nowrap;}
  .icon-del{background:none;border:none;padding:3px;margin:-2px;cursor:pointer;color:var(--t3);display:flex;}
  .icon-del:active{color:var(--danger);}
  .veh-stats{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid var(--b1);cursor:pointer;}
  .veh-stat{padding:10px 14px;border-right:1px solid var(--b1);}
  .veh-stat:last-child{border-right:none;}
  .veh-stat-l{font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--t3);margin-bottom:3px;}
  .veh-stat-v{font-family:var(--f-data);font-size:12px;font-weight:500;color:var(--t1);}

  .detail-hero{background:var(--bg-2);border:1px solid var(--b1);border-left:3px solid var(--accent);border-radius:var(--r-lg);padding:18px;margin-top:8px;margin-bottom:16px;}
  .detail-brand{font-family:var(--f-display);font-size:32px;font-weight:800;letter-spacing:0.03em;color:var(--t1);line-height:1;margin-bottom:4px;}
  .detail-model{font-size:13px;color:var(--t2);font-weight:500;margin-bottom:16px;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b1);border-radius:var(--r-md);overflow:hidden;}
  .detail-cell{background:var(--bg-2);padding:11px 14px;}
  .detail-cell-l{font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--t3);margin-bottom:3px;}
  .detail-cell-v{font-family:var(--f-data);font-size:14px;font-weight:500;color:var(--t1);}

  .empty{text-align:center;padding:22px 18px;color:var(--t3);font-size:12px;background:var(--bg-2);border:1px dashed var(--b2);border-radius:var(--r-md);line-height:1.5;}

  .btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:13px;border-radius:var(--r-sm);font-family:var(--f-body);font-size:14px;font-weight:600;cursor:pointer;border:none;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-secondary{background:var(--bg-4);color:var(--t1);border:1px solid var(--b2);}
  .btn-danger{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(239,68,68,0.25);}
  .btn-ok{background:var(--ok-dim);color:var(--ok);border:1px solid rgba(34,197,94,0.25);}
  .btn-row{display:flex;gap:10px;margin-top:16px;}
  .btn-sheet{justify-content:flex-start;margin-bottom:10px;}
  .btn-add-small{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;border-radius:var(--r-sm);background:var(--bg-2);border:1px dashed var(--b2);color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--f-body);margin-top:8px;}

  .modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:flex-end;z-index:50;animation:fade .2s ease;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .modal{width:100%;background:var(--bg-1);border-top:1px solid var(--b2);border-radius:20px 20px 0 0;padding:8px 20px 28px;max-height:92%;overflow-y:auto;animation:slideup .25s cubic-bezier(.2,.8,.2,1);}
  .modal::-webkit-scrollbar{width:0;}
  @keyframes slideup{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .modal-handle{width:36px;height:4px;background:var(--b3);border-radius:2px;margin:4px auto 18px;}
  .modal-title{font-family:var(--f-display);font-size:24px;font-weight:700;letter-spacing:0.03em;color:var(--t1);margin-bottom:4px;}
  .modal-desc{font-size:12px;color:var(--t2);margin-bottom:20px;line-height:1.4;}

  .field{margin-bottom:14px;}
  .field-label{font-size:11px;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:7px;display:block;}
  .field input,.field select,.field textarea{width:100%;background:var(--bg-2);border:1px solid var(--b2);border-radius:var(--r-sm);padding:12px 14px;font-family:var(--f-body);font-size:14px;color:var(--t1);outline:none;}
  .field input:focus,.field select:focus{border-color:var(--accent);}
  .field input.mono{font-family:var(--f-data);}
  .field input::placeholder{color:var(--t3);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  select{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23596070' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 14px center;}

  .chips{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{padding:9px 14px;background:var(--bg-2);border:1px solid var(--b2);border-radius:var(--r-sm);font-size:12px;color:var(--t2);cursor:pointer;font-weight:500;}
  .chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}

  .back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--t2);font-family:var(--f-body);font-size:13px;font-weight:500;cursor:pointer;padding:4px 0;}
  .delta{font-family:var(--f-data);font-size:10px;font-weight:500;margin-left:6px;}

  .toast{position:absolute;top:64px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--bg-5);border:1px solid var(--b3);color:var(--t1);font-size:12.5px;font-weight:500;padding:10px 16px;border-radius:var(--r-sm);z-index:100;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:88%;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,0.45);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .legend-row{display:flex;align-items:center;gap:8px;padding:6px 0;}
  .year-nav{display:inline-flex;align-items:center;gap:10px;text-transform:none;letter-spacing:0;}
  .year-arrow{width:26px;height:26px;border-radius:7px;background:var(--bg-3);border:1px solid var(--b2);color:var(--t1);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:0;padding-bottom:2px;}
  .year-arrow:disabled{opacity:.35;cursor:default;}
  .year-cur{font-family:var(--f-data);font-size:13px;color:var(--accent);font-weight:500;min-width:42px;text-align:center;}

  /* ───── LAYOUTS RESPONSIVE ───── */
  .layout-narrow{flex:1;min-width:0;display:flex;flex-direction:column;}
  .card-grid{display:grid;grid-template-columns:1fr;gap:12px;}
  .card-grid .veh{margin-bottom:0;}
  /* iPad portrait & écrans moyens : on occupe la largeur */
  @media (min-width:700px){
    .layout-narrow .stat-grid{grid-template-columns:repeat(4,1fr);}
    .layout-narrow .card-grid{grid-template-columns:1fr 1fr;}
    .layout-narrow .view{padding:0 24px 28px;}
    .layout-narrow .header{padding:22px 24px 16px;}
  }

  /* PC & iPad paysage : barre latérale + maître-détail */
  .layout-wide{flex:1;min-width:0;display:flex;height:100%;}
  .sidebar{width:236px;flex-shrink:0;background:var(--bg-1);border-right:1px solid var(--b1);display:flex;flex-direction:column;padding:22px 14px 16px;overflow-y:auto;}
  .side-logo{font-family:var(--f-display);font-size:21px;font-weight:800;letter-spacing:0.04em;color:var(--t1);padding:0 10px 22px;}
  .side-nav{display:flex;flex-direction:column;gap:3px;}
  .side-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--r-sm);background:none;border:none;cursor:pointer;color:var(--t2);font-family:var(--f-body);font-size:14px;font-weight:500;text-align:left;}
  .side-item:hover{background:var(--bg-2);color:var(--t1);}
  .side-item.active{background:var(--accent-dim);color:var(--accent);}
  .side-foot{margin-top:auto;padding:14px 10px 0;font-family:var(--f-data);font-size:10px;color:var(--t3);letter-spacing:0.1em;}
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .main-header{flex-shrink:0;padding:22px 28px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--b1);}
  .main-content{flex:1;min-height:0;overflow-y:auto;padding:4px 28px 32px;}
  .main-content .inner{max-width:960px;margin:0 auto;}
  .layout-wide .stat-grid{grid-template-columns:repeat(4,1fr);}
  .layout-wide .card-grid{grid-template-columns:1fr 1fr;}
  .md{flex:1;min-height:0;display:flex;}
  .md-list{width:380px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--b1);padding:18px 16px;}
  .md-detail{flex:1;min-width:0;min-height:0;overflow-y:auto;padding:4px 28px 32px;}
  .md-group{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--t3);font-weight:500;margin:16px 4px 10px;}
  .md-group:first-child{margin-top:0;}
  .md-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;}
  .veh.selected{box-shadow:0 0 0 2px var(--accent);}
  /* encoches (mode plein écran installé sur iPhone/iPad) */
  @supports (padding: max(0px)){
    .layout-narrow .header{ padding-top: calc(18px + env(safe-area-inset-top)); }
    .layout-narrow .nav{ padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
    .sidebar{ padding-top: calc(22px + env(safe-area-inset-top)); padding-left: calc(14px + env(safe-area-inset-left)); }
    .main-header{ padding-top: calc(22px + env(safe-area-inset-top)); }
    .main-content, .md-list, .md-detail{ padding-bottom: calc(32px + env(safe-area-inset-bottom)); }
    .toast{ top: calc(64px + env(safe-area-inset-top)); }
  }
  /* très grands écrans : 3 colonnes de cartes */
  @media (min-width:1500px){ .layout-wide .card-grid{grid-template-columns:1fr 1fr 1fr;} }

  /* ───── IMPRESSION / PDF ───── */
  #print-area{ display:none; }
  @media print{
    html,body{ background:#fff !important; height:auto !important; overflow:visible !important; display:block !important; }
    .app, .toast, #modal{ display:none !important; }
    #print-area{ display:block; color:#14171c; font-family:'DM Sans',sans-serif; }
    @page{ margin:14mm; }
  }

  /* ───── ONBOARDING ───── */
  .onb{position:absolute;inset:0;z-index:200;background:var(--bg-0);display:flex;flex-direction:column;}
  .onb-top{display:flex;justify-content:flex-end;padding:14px 18px;padding-top:calc(14px + env(safe-area-inset-top));min-height:48px;}
  .onb-skip{background:none;border:none;color:var(--t2);font-size:13px;font-family:var(--f-body);cursor:pointer;font-weight:500;}
  .onb-body{flex:1;min-height:0;overflow-y:auto;padding:8px 28px;display:flex;flex-direction:column;justify-content:center;max-width:480px;margin:0 auto;width:100%;}
  .onb-hero{width:86px;height:86px;border-radius:22px;background:var(--accent-dim);border:1px solid rgba(240,82,26,0.25);display:flex;align-items:center;justify-content:center;margin:0 auto 26px;}
  .onb-title{font-family:var(--f-display);font-size:30px;font-weight:800;letter-spacing:0.03em;color:var(--t1);text-align:center;line-height:1.05;margin-bottom:12px;}
  .onb-text{font-size:14px;color:var(--t2);text-align:center;line-height:1.55;}
  .onb-tip{display:flex;gap:13px;align-items:flex-start;padding:9px 0;}
  .onb-tip-ic{width:36px;height:36px;border-radius:10px;background:var(--bg-3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .onb-tip-t{font-size:13.5px;color:var(--t1);font-weight:600;}
  .onb-tip-s{font-size:12px;color:var(--t3);margin-top:2px;line-height:1.45;}
  .onb-foot{padding:14px 24px;padding-bottom:calc(20px + env(safe-area-inset-bottom));max-width:480px;margin:0 auto;width:100%;}
  .onb-dots{display:flex;gap:7px;justify-content:center;margin-bottom:16px;}
  .onb-dot{width:7px;height:7px;border-radius:50%;background:var(--bg-5);transition:all .2s;}
  .onb-dot.on{background:var(--accent);width:22px;border-radius:4px;}

  /* ───── TRANSITIONS ───── */
  @keyframes viewIn{ from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:none;} }
  .view-anim{ animation:viewIn .28s cubic-bezier(.22,.61,.36,1) both; }
  @keyframes onbInFwd{ from{opacity:0;transform:translateX(28px);} to{opacity:1;transform:none;} }
  @keyframes onbInBack{ from{opacity:0;transform:translateX(-28px);} to{opacity:1;transform:none;} }
  .onb-body.fwd{ animation:onbInFwd .3s cubic-bezier(.22,.61,.36,1) both; }
  .onb-body.back{ animation:onbInBack .3s cubic-bezier(.22,.61,.36,1) both; }
  @media (prefers-reduced-motion: reduce){ .view-anim,.onb-body.fwd,.onb-body.back{ animation:none; } }
</style>
</head>
<body>
<div class="app">
  <div id="shell"></div>
  <div id="modal"></div>
  <div class="toast" id="toast"></div>
  <div id="onboarding"></div>
</div>
<div id="print-area"></div>

<script>
/* ════════════ CATEGORIES ════════════ */
const CAT = { voiture:'Voiture', moto:'Moto', cyclomoteur:'Cyclomoteur', autre:'Autre' };
const CATMAP = { voiture:'voiture', moto:'moto', motocross:'moto', cyclomoteur:'cyclomoteur', quad:'autre', kart:'autre', autre:'autre' };
const catLabel = v => CAT[v.category] || 'Autre';

/* ════════════ DEFAULT DATA ════════════ */
function defaultData(){
  return {
    settings:{ name:'', warnKm:1500, warnHours:10, warnDays:30, warnConsPct:25 },
    nextId:1,
    vehicles:[],
  };
}

/* ════════════ PERSISTENCE ════════════ */
const STORE_KEY = 'pitstop-manager-v3';
let vehicles = [];
let settings = {};
let nextId = 600;
let onboarded = false;
let dataUpdatedAt = 0;
let sync = { repo:'', token:'', enabled:false, lastSync:0, lastError:'' };

function migrate(){
  vehicles.forEach(v=>{
    v.category = CATMAP[v.category] || 'autre';
    v.recos = v.recos || []; v.history = v.history || []; v.deadlines = v.deadlines || []; v.fuelLogs = v.fuelLogs || [];
    v.tags = v.tags || [];
    v.usageLog = v.usageLog || [];
    if(!v.usageLog.length) v.usageLog.push({id:++nextId, date:todayISO(), value:v.usage||0});
    v.recos.forEach(r=>{ if(r.intervalMonths===undefined) r.intervalMonths=null; if(r.interval===undefined) r.interval=null; });
    v.history.forEach(h=>{ if(h.cost==null) h.cost=0; });
    v.fuelLogs.forEach(f=>{ if(f.cost==null) f.cost=0; });
  });
}
function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){
      const d = JSON.parse(raw);
      vehicles = d.vehicles || [];
      settings = Object.assign({name:'',warnKm:1500,warnHours:10,warnDays:30,warnConsPct:25}, d.settings||{});
      nextId = d.nextId || 600;
      onboarded = !!d.onboarded;
      dataUpdatedAt = d.dataUpdatedAt || 0;
      sync = Object.assign({repo:'', token:'', enabled:false, lastSync:0, lastError:''}, d.sync||{});
      migrate(); return;
    }
  }catch(e){ console.warn('Lecture stockage impossible', e); }
  const d = defaultData();
  vehicles = d.vehicles; settings = d.settings; nextId = d.nextId; onboarded = false;
  save();
}
function persist(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify({vehicles, settings, nextId, onboarded, dataUpdatedAt, sync})); }
  catch(e){ console.warn('Sauvegarde impossible', e); }
}
function save(){
  dataUpdatedAt = Date.now();
  persist();
  schedulePush();
}
function doReset(){
  const d = defaultData();
  vehicles = d.vehicles; settings = d.settings; nextId = d.nextId; onboarded = false;
  state.onbSlide = 0; state.onbSettings = null;
  save(); state.tab='home'; state.vehicleId=null; render();
}
function resetData(){
  confirmDialog('Réinitialiser les données', 'Tout ton parc et tes réglages seront effacés. Action irréversible.', 'Réinitialiser', doReset);
}

/* ════════════ STATE ════════════ */
let state = { tab:'home', vehicleId:null, modal:null, ctx:{}, draft:{}, onbSlide:0, onbSettings:null, onbDir:'fwd', garageSearch:'', garageSort:'alert', pageAnim:false };
let _confirmCb = null;

/* ════════════ HELPERS ════════════ */
const RECO_NAME = { oil:'Vidange', brake:'Plaquettes de frein', tire:'Pneumatiques', belt:'Courroie de distribution', filter:'Filtre', other:'' };
const REC_LABEL = { none:'', '1y':'tous les ans', '2y':'tous les 2 ans' };
const TYPE_COLOR = { oil:'#F0521A', brake:'#EF4444', tire:'#60A5FA', belt:'#A78BFA', filter:'#22C55E', other:'#9AA4B2', maint:'#60A5FA', fuel:'#F0521A' };
const TYPE_LABEL = { oil:'Vidange', brake:'Freins', tire:'Pneus', belt:'Courroie', filter:'Filtre', other:'Autre', maint:'Entretien', fuel:'Carburant' };
const today = () => new Date();
const fmt = n => Math.round(n).toLocaleString('fr-FR');
const fmtPrice = n => Math.round(n).toLocaleString('fr-FR') + ' €';
const byId = id => vehicles.find(v => v.id === id);
function fmtDate(s){ return new Date(s).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function daysUntil(s){ return Math.round((new Date(s) - today())/86400000); }
function unitL(v){ return v.unit==='h' ? 'h' : 'km'; }
function unitName(v){ return v.unit==='h' ? 'Heures' : 'Km'; }
function isElectric(v){ return v.fuel==='Électrique'; }
function energyUnit(v){ return isElectric(v) ? 'kWh' : 'L'; }
function consUnit(v){ const e = energyUnit(v); return v.unit==='h' ? `${e}/h` : `${e}/100km`; }
function warnThreshold(v){ return v.unit==='h' ? settings.warnHours : settings.warnKm; }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function addMonthsISO(iso, months){ const d=new Date(iso); d.setMonth(d.getMonth()+Number(months)); return d.toISOString().slice(0,10); }
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function vehTitle(v){
  if(v.brand && v.brand.trim()) return v.brand.toUpperCase();
  if(v.name && v.name.trim())   return v.name.toUpperCase();
  return catLabel(v).toUpperCase();
}
function vehSub(v){
  const bits = [];
  if(v.brand && v.brand.trim() && v.model && v.model.trim()) bits.push(v.model);
  else if((!v.brand || !v.brand.trim()) && v.name && v.name.trim()) bits.push(catLabel(v));
  else if(v.model && v.model.trim()) bits.push(v.model);
  if(v.year) bits.push(v.year);
  if(!bits.length) bits.push(catLabel(v));
  return bits.join(' · ');
}

function recoStatus(r, v){
  const u = unitL(v);
  const hasDist = r.interval!=null && r.interval>0;
  const hasTime = r.intervalMonths!=null && r.intervalMonths>0;
  if(!hasDist && !hasTime) return {s:'info', label:'À planifier', detail:'Intervalle non défini', short:'—', urgency:999};
  const distPending = hasDist && (r.lastDone==null);
  const timePending = hasTime && !r.lastDoneDate;
  const allPending = (!hasDist || distPending) && (!hasTime || timePending);
  if(allPending){
    const p=[]; if(hasDist) p.push(`tous les ${fmt(r.interval)} ${u}`); if(hasTime) p.push(`tous les ${r.intervalMonths} mois`);
    return {s:'info', label:'À planifier', detail:`${p.join(' / ')} · jamais effectué`, short:'—', urgency:998};
  }
  const rank={ok:0,warn:1,danger:2};
  let s='ok'; const dparts=[]; const ratios=[]; const shortCand=[];
  if(hasDist && !distPending){
    const next=r.lastDone+r.interval, rem=next-v.usage;
    const sd = rem<0?'danger':(rem<warnThreshold(v)?'warn':'ok'); if(rank[sd]>rank[s]) s=sd;
    dparts.push(rem<0?`dépassé de ${fmt(-rem)} ${u}`:`dans ${fmt(rem)} ${u}`);
    const thr=warnThreshold(v)||1; ratios.push(rem/thr); shortCand.push({r:rem/thr, txt: rem<0?`+${fmt(-rem)} ${u}`:`${fmt(rem)} ${u}`});
  }
  if(hasTime && !timePending){
    const nd=addMonthsISO(r.lastDoneDate, r.intervalMonths), remD=daysUntil(nd);
    const st = remD<0?'danger':(remD<settings.warnDays?'warn':'ok'); if(rank[st]>rank[s]) s=st;
    dparts.push(remD<0?`dépassé de ${-remD} j`:`dans ${remD} j`);
    const thr=settings.warnDays||1; ratios.push(remD/thr); shortCand.push({r:remD/thr, txt: remD<0?`+${-remD} j`:`${remD} j`});
  }
  shortCand.sort((a,b)=>a.r-b.r);
  const label = s==='danger'?'En retard':s==='warn'?'Bientôt':'À jour';
  return {s, label, detail:dparts.join(' · '), short: shortCand.length?shortCand[0].txt:'—', urgency: ratios.length?Math.min(...ratios):997};
}
function deadlineStatus(d){
  const days = daysUntil(d.date);
  const rec = REC_LABEL[d.recurrence] ? ` · ${REC_LABEL[d.recurrence]}` : '';
  if(days < 0)  return {s:'danger', label:'Dépassé',  detail:`Échéance ${fmtDate(d.date)}${rec}`, days};
  if(days < settings.warnDays) return {s:'warn', label:'Bientôt', detail:`Dans ${days} j · ${fmtDate(d.date)}${rec}`, days};
  return {s:'info', label:'Planifié', detail:`${fmtDate(d.date)}${rec}`, days};
}
function vehicleStatus(v){
  if(v.status === 'sold')     return {s:'sold', label:'Vendu'};
  if(v.status === 'for_sale') return {s:'sale', label:'En vente'};
  let worst = 'ok', alerts = 0;
  v.recos.forEach(r => { const s = recoStatus(r,v).s; if(s==='danger'){worst='danger';alerts++;} else if(s==='warn'){if(worst!=='danger')worst='warn';alerts++;} });
  v.deadlines.forEach(d => { const s = deadlineStatus(d).s; if(s==='danger'){worst='danger';alerts++;} else if(s==='warn'){if(worst!=='danger')worst='warn';alerts++;} });
  return {s: worst, label: worst==='ok' ? 'À jour' : `${alerts} alerte${alerts>1?'s':''}`, alerts};
}
function allAlerts(){
  const out = [];
  vehicles.filter(v=>v.status!=='sold').forEach(v=>{
    v.recos.forEach(r=>{ const st=recoStatus(r,v); if(st.s==='danger'||st.s==='warn'){
      out.push({veh:v, name:r.name, type:r.type, st, prio: st.s==='danger'?0:1, sort: st.urgency, short: st.short}); } });
    v.deadlines.forEach(d=>{ const st=deadlineStatus(d); if(st.s==='danger'||st.s==='warn'){
      out.push({veh:v, name:d.name, type:'date', st, prio: st.s==='danger'?0:1, sort: st.days/(settings.warnDays||1), short: st.days<0?`+${-st.days} j`:`${st.days} j`}); } });
  });
  return out.sort((a,b)=> a.prio-b.prio || a.sort-b.sort);
}

/* consumption + expenses */
function avgCons(v){
  if(!v.fuelLogs.length) return null;
  const L = v.fuelLogs.reduce((s,f)=>s+f.liters,0); const D = v.fuelLogs.reduce((s,f)=>s+f.distance,0);
  if(D<=0) return null; return v.unit==='h' ? L/D : L/D*100;
}
function fillCons(f, v){ if(f.distance<=0) return null; return v.unit==='h' ? f.liters/f.distance : f.liters/f.distance*100; }
function expenseByType(v){ const m={}; v.history.forEach(h=>{ if(h.cost>0) m[h.type]=(m[h.type]||0)+h.cost; }); return m; }
function fuelSpend(v){ return v.fuelLogs.reduce((s,f)=>s+(f.cost||0),0); }
function maintSpend(v){ return v.history.reduce((s,h)=>s+(h.cost||0),0); }
function totalSpend(v){ return fuelSpend(v)+maintSpend(v); }
function distanceLogged(v){ return v.fuelLogs.reduce((s,f)=>s+f.distance,0); }
function costPerUnit(v){ const d=distanceLogged(v); return d>0 ? totalSpend(v)/d : null; }
function logUsage(v, value, date){
  v.usageLog = v.usageLog || [];
  const ex = v.usageLog.find(e=>e.date===date);
  if(ex){ ex.value = Math.max(ex.value, value); }
  else v.usageLog.push({id:++nextId, date, value});
}
function avgConsExcl(v, fId){
  const o = v.fuelLogs.filter(f=>f.id!==fId);
  if(!o.length) return null;
  const L=o.reduce((s,f)=>s+f.liters,0), D=o.reduce((s,f)=>s+f.distance,0);
  if(D<=0) return null; return v.unit==='h' ? L/D : L/D*100;
}
function fillAnomaly(f, v){
  const c=fillCons(f,v); const a=avgConsExcl(v,f.id);
  if(c==null||a==null||a<=0) return 0;
  const dev=(c-a)/a*100, thr=settings.warnConsPct||25;
  if(dev>=thr) return 1; if(dev<=-thr) return -1; return 0;
}
function latestFill(v){ if(!v.fuelLogs.length) return null; return [...v.fuelLogs].sort((a,b)=>new Date(b.date)-new Date(a.date))[0]; }
function expenseYears(){
  const ys = new Set();
  vehicles.forEach(v=>{
    v.history.forEach(h=>{ if(h.cost>0) ys.add(new Date(h.date).getFullYear()); });
    v.fuelLogs.forEach(f=>{ if(f.cost>0) ys.add(new Date(f.date).getFullYear()); });
  });
  ys.add(new Date().getFullYear());
  return [...ys].sort((a,b)=>a-b);
}
function spendInYear(year){
  let maint=0, fuel=0;
  vehicles.forEach(v=>{
    v.history.forEach(h=>{ if(h.cost>0 && new Date(h.date).getFullYear()===year) maint+=h.cost; });
    v.fuelLogs.forEach(f=>{ if(f.cost>0 && new Date(f.date).getFullYear()===year) fuel+=f.cost; });
  });
  return {maint, fuel};
}
function projection12(){
  const active = vehicles.filter(v=>v.status!=='sold');
  let eCost=0, minD=null, maxD=null;
  active.forEach(v=>v.fuelLogs.forEach(f=>{ if(f.cost>0){ eCost+=f.cost; const d=new Date(f.date); if(!minD||d<minD)minD=d; if(!maxD||d>maxD)maxD=d; } }));
  let energyYear=0;
  if(eCost>0 && minD && maxD){ const days=Math.max(30,(maxD-minD)/86400000); energyYear=eCost/days*365; }
  const cut=new Date(); cut.setFullYear(cut.getFullYear()-1);
  let maint12=0; active.forEach(v=>v.history.forEach(h=>{ if(h.cost>0 && new Date(h.date)>=cut) maint12+=h.cost; }));
  const total=energyYear+maint12;
  return {energyYear, maint12, total, monthly: total/12};
}
function financeYear(delta){
  const years = expenseYears();
  let i = years.indexOf(state.financeYear);
  if(i<0) i = years.length-1;
  state.financeYear = years[Math.min(years.length-1, Math.max(0, i+delta))];
  render();
}
let _fyX = null;
function fySwipeStart(e){ _fyX = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0].clientX : null; }
function fySwipeEnd(e){
  if(_fyX==null) return;
  const x = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0].clientX : null;
  const dx = (x==null) ? 0 : x-_fyX; _fyX=null;
  if(Math.abs(dx) < 40) return;
  financeYear(dx < 0 ? 1 : -1);
}

/* icons */
const ICONS = {
  oil:'<path d="M4 6h7l2 3h3v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6z" stroke="CC" stroke-width="1.3" fill="none" stroke-linejoin="round"/><path d="M11 6V4h2" stroke="CC" stroke-width="1.3" stroke-linecap="round"/>',
  brake:'<circle cx="10" cy="10" r="6" stroke="CC" stroke-width="1.3" fill="none"/><circle cx="10" cy="10" r="2" stroke="CC" stroke-width="1.3" fill="none"/>',
  tire:'<circle cx="10" cy="10" r="6.5" stroke="CC" stroke-width="1.3" fill="none"/><circle cx="10" cy="10" r="2.5" stroke="CC" stroke-width="1.3" fill="none"/><path d="M10 3.5v3M10 13.5v3M3.5 10h3M13.5 10h3" stroke="CC" stroke-width="1.3" stroke-linecap="round"/>',
  belt:'<path d="M5 10a5 5 0 0 1 10 0a5 5 0 0 1-10 0z" stroke="CC" stroke-width="1.3" fill="none"/><path d="M8 8l4 4M12 8l-4 4" stroke="CC" stroke-width="1.1"/>',
  filter:'<path d="M4 5h12l-4 5v5l-4-2v-3L4 5z" stroke="CC" stroke-width="1.3" fill="none" stroke-linejoin="round"/>',
  date:'<rect x="4" y="5.5" width="12" height="11" rx="2" stroke="CC" stroke-width="1.3" fill="none"/><path d="M7 3.5v4M13 3.5v4" stroke="CC" stroke-width="1.3" stroke-linecap="round"/>',
  fuel:'<path d="M5 16V5a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v11M4 16h9M12 8h2.5a1 1 0 0 1 1 1v4a1.5 1.5 0 0 0 3 0V7l-2-2" stroke="CC" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>',
  other:'<circle cx="10" cy="10" r="6.5" stroke="CC" stroke-width="1.3" fill="none"/><path d="M10 7v3l2 2" stroke="CC" stroke-width="1.3" stroke-linecap="round"/>',
};
function icon(t,c){ return `<svg width="18" height="18" viewBox="0 0 20 20" fill="none">${(ICONS[t]||ICONS.other).replaceAll('CC',c)}</svg>`; }
const SC = {ok:'var(--ok)', warn:'var(--warn)', danger:'var(--danger)', info:'var(--info)'};
const SD = {ok:'var(--ok-dim)', warn:'var(--warn-dim)', danger:'var(--danger-dim)', info:'var(--info-dim)'};
const trashSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2.5 4.5h11M6 4.5V3h4v1.5M4 4.5l.6 8.5h6.8L12 4.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const editSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10.5 2.5l3 3L6 13l-3.5.5L3 10l7.5-7.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>';
const checkSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8l3.5 3.5L13 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
function addBtn(label, onclick){ return `<button class="btn-add-small" onclick="${onclick}"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><line x1="6.5" y1="2" x2="6.5" y2="11" stroke="var(--t2)" stroke-width="1.5" stroke-linecap="round"/><line x1="2" y1="6.5" x2="11" y2="6.5" stroke="var(--t2)" stroke-width="1.5" stroke-linecap="round"/></svg>${label}</button>`; }

/* ════════════ CHARTS ════════════ */
function donutSVG(map){
  const entries = Object.entries(map).sort((a,b)=>b[1]-a[1]);
  const total = entries.reduce((s,e)=>s+e[1],0);
  if(!total) return `<div class="empty">Aucune dépense enregistrée. Renseigne un coût en marquant un entretien comme fait.</div>`;
  const r=52, cx=70, cy=70, circ=2*Math.PI*r, sw=20;
  let off=0, segs='';
  entries.forEach(([type,val])=>{
    const len = val/total*circ;
    segs += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${TYPE_COLOR[type]||'#9AA4B2'}" stroke-width="${sw}" stroke-dasharray="${len.toFixed(2)} ${(circ-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    off += len;
  });
  const legend = entries.map(([type,val])=>`<div class="legend-row"><span style="width:10px;height:10px;border-radius:3px;background:${TYPE_COLOR[type]||'#9AA4B2'};flex-shrink:0;"></span><span style="flex:1;font-size:12.5px;color:var(--t1);">${TYPE_LABEL[type]||'Autre'}</span><span style="font-family:var(--f-data);font-size:12px;color:var(--t2);">${fmtPrice(val)}</span><span style="font-family:var(--f-data);font-size:11px;color:var(--t3);width:40px;text-align:right;">${Math.round(val/total*100)}%</span></div>`).join('');
  return `<div style="display:flex;justify-content:center;margin:4px 0 10px;position:relative;">
      <svg width="140" height="140" viewBox="0 0 140 140">${segs}</svg>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;"><div style="font-family:var(--f-display);font-size:22px;font-weight:700;color:var(--t1);line-height:1;">${fmt(total)}</div><div style="font-size:10px;color:var(--t3);">€ au total</div></div></div>
    <div>${legend}</div>`;
}
function consChartSVG(v){
  const logs = [...v.fuelLogs].sort((a,b)=> new Date(a.date)-new Date(b.date));
  const pts = logs.map(f=>({c:fillCons(f,v)})).filter(p=>p.c!=null);
  if(pts.length<1) return `<div class="empty">Pas assez de données pour tracer un graphique.</div>`;
  const W=300,H=130,pad=26,top=16,bot=H-22;
  const vals = pts.map(p=>p.c); let min=Math.min(...vals), max=Math.max(...vals);
  if(min===max){ min-=0.5; max+=0.5; }
  const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
  const x = i => pts.length===1 ? W/2 : pad + i*(W-2*pad)/(pts.length-1);
  const y = val => bot - (val-min)/(max-min)*(bot-top);
  const line = pts.map((p,i)=>`${x(i).toFixed(1)},${y(p.c).toFixed(1)}`).join(' ');
  const dots = pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.c).toFixed(1)}" r="3" fill="#F0521A"/>`).join('');
  const ay = y(avg).toFixed(1);
  return `<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;">
    <line x1="${pad}" y1="${ay}" x2="${W-pad}" y2="${ay}" stroke="#596070" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="${W-pad}" y="${(ay-5)}" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="9" fill="#596070">moy ${avg.toFixed(1)}</text>
    ${pts.length>1?`<polyline points="${line}" fill="none" stroke="#F0521A" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`:''}
    ${dots}
    <text x="6" y="${top+3}" font-family="JetBrains Mono,monospace" font-size="9" fill="#596070">${max.toFixed(1)}</text>
    <text x="6" y="${bot}" font-family="JetBrains Mono,monospace" font-size="9" fill="#596070">${min.toFixed(1)}</text>
  </svg>`;
}
function sparkSVG(vals){
  if(!vals.length) return '';
  const W=300,H=110,pad=8,top=14,bot=H-16;
  let min=Math.min(...vals), max=Math.max(...vals); if(min===max){ min-=1; max+=1; }
  const x=i=> vals.length===1 ? W/2 : pad + i*(W-2*pad)/(vals.length-1);
  const y=val=> bot - (val-min)/(max-min)*(bot-top);
  const line=vals.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const dots=vals.map((v,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="2.6" fill="#F0521A"/>`).join('');
  return `<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;">
    ${vals.length>1?`<polyline points="${line}" fill="none" stroke="#F0521A" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`:''}
    ${dots}
    <text x="${W-4}" y="${top}" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="9" fill="#596070">${fmt(max)}</text>
    <text x="${W-4}" y="${bot}" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="9" fill="#596070">${fmt(min)}</text>
  </svg>`;
}
function usageSection(v){
  const u=unitL(v);
  const log=[...(v.usageLog||[])].sort((a,b)=> new Date(a.date)-new Date(b.date));
  let rythme='—';
  if(log.length>=2){
    const f=log[0], l=log[log.length-1];
    const days=(new Date(l.date)-new Date(f.date))/86400000, diff=l.value-f.value;
    if(days>=30 && diff>0) rythme = fmt(diff/days*365)+' '+u+'/an';
  }
  let html=`<div class="stat" style="padding:16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-end;">
    <div><div class="stat-label" style="margin:0 0 4px;">Compteur actuel</div><div class="stat-val">${fmt(v.usage)}<span class="unit">${u}</span></div></div>
    <div style="text-align:right;"><div class="stat-label" style="margin:0 0 4px;">Rythme estimé</div><div style="font-family:var(--f-data);font-size:14px;color:var(--t1);">${rythme}</div></div></div>`;
  if(log.length>=2) html += `<div style="background:var(--bg-2);border:1px solid var(--b1);border-radius:var(--r-md);padding:12px 8px 4px;">${sparkSVG(log.map(e=>e.value))}</div>`;
  return html;
}
function tcoSection(v){
  const fuel=fuelSpend(v), maint=maintSpend(v);
  const depr=Math.max(0, (v.purchasePrice||0) - (v.estValue||0));
  const tco=fuel+maint+depr;
  const dist=distanceLogged(v), u=unitL(v);
  const perKm = dist>0 ? tco/dist : null;
  return `<div class="detail-grid">
    <div class="detail-cell"><div class="detail-cell-l">Entretien</div><div class="detail-cell-v">${fmtPrice(maint)}</div></div>
    <div class="detail-cell"><div class="detail-cell-l">${isElectric(v)?'Énergie':'Carburant'}</div><div class="detail-cell-v">${fmtPrice(fuel)}</div></div>
    <div class="detail-cell"><div class="detail-cell-l">Dépréciation</div><div class="detail-cell-v">${fmtPrice(depr)}</div></div>
    <div class="detail-cell"><div class="detail-cell-l">Coût total</div><div class="detail-cell-v" style="color:var(--accent);">${fmtPrice(tco)}</div></div>
    <div class="detail-cell"><div class="detail-cell-l">Coût / ${u}</div><div class="detail-cell-v">${perKm!=null?perKm.toFixed(v.unit==='h'?1:2)+' €':'—'}</div></div>
    <div class="detail-cell"><div class="detail-cell-l">Distance suivie</div><div class="detail-cell-v">${fmt(dist)} ${u}</div></div>
  </div>`;
}
function fuelRow(v, f, sortedDesc, i){
  const c = fillCons(f,v); const prev = sortedDesc[i+1] ? fillCons(sortedDesc[i+1],v) : null;
  let delta='';
  if(prev!=null && c!=null){
    if(c > prev+0.05)      delta = `<span class="delta" style="color:var(--danger);">▲ +${(c-prev).toFixed(1)}</span>`;
    else if(c < prev-0.05) delta = `<span class="delta" style="color:var(--ok);">▼ −${(prev-c).toFixed(1)}</span>`;
    else                   delta = `<span class="delta" style="color:var(--t3);">=</span>`;
  }
  const an = fillAnomaly(f,v);
  const flag = an>0 ? `<span class="delta" style="color:var(--danger);" title="Surconsommation">⚠</span>` : '';
  const eu = energyUnit(v);
  return `<div class="row tap" onclick="openModal('fuelActions',{vehicleId:${v.id},fuelId:${f.id}})">
    <div class="row-icon" style="background:${an>0?'var(--danger-dim)':'var(--accent-dim)'};">${icon('fuel',an>0?'var(--danger)':'var(--accent)')}</div>
    <div class="row-body"><div class="row-name">${c!=null?c.toFixed(1):'—'} ${consUnit(v)}${delta}${flag}</div><div class="row-sub">${fmtDate(f.date)} · ${f.liters} ${eu} · ${fmt(f.distance)} ${unitL(v)}</div></div>
    ${f.cost>0?`<div style="font-family:var(--f-data);font-size:12px;color:var(--t1);">${fmtPrice(f.cost)}</div>`:''}
  </div>`;
}
function historyRow(v, h){
  return `<div class="row tap" onclick="openModal('historyActions',{vehicleId:${v.id},historyId:${h.id}})">
    <div class="row-icon" style="background:var(--bg-4);">${icon(h.type,'var(--t2)')}</div>
    <div class="row-body"><div class="row-name">${h.name}</div><div class="row-sub">${fmtDate(h.date)} · à ${fmt(h.doneAt)} ${h.unit}</div></div>
    ${h.cost>0?`<div style="font-family:var(--f-data);font-size:12px;color:var(--t1);">${fmtPrice(h.cost)}</div>`:`<span style="color:var(--ok);">${checkSvg}</span>`}
  </div>`;
}

/* ── ONBOARDING (première connexion) ── */
function renderOnboarding(){
  if(!state.onbSettings) state.onbSettings = {name:settings.name||'', warnKm:settings.warnKm, warnHours:settings.warnHours, warnDays:settings.warnDays};
  const s = state.onbSlide, o = state.onbSettings;
  const gauge = `<svg width="44" height="44" viewBox="0 0 20 20" fill="none"><path d="M3.2 14.5a7 7 0 1 1 13.6 0" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/><path d="M10 11.5l3.6-3.2" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/><circle cx="10" cy="11.5" r="1.5" fill="var(--accent)"/></svg>`;
  const bigCheck = `<svg width="42" height="42" viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4.5 4.5L19 7" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  let body='';
  if(s===0){
    body = `<div class="onb-hero">${gauge}</div>
      <div class="onb-title"><span>PITSTOP</span> <span style="color:var(--accent);">MANAGER</span></div>
      <div class="onb-text">Suis l'entretien, les échéances, la consommation et les coûts de tous tes véhicules — voiture, moto et autres engins.</div>`;
  } else if(s===1){
    body = `<div class="onb-title">PERSONNALISE</div>
      <div class="onb-text" style="margin-bottom:22px;">Quelques réglages pour démarrer. Tu pourras les changer à tout moment dans Réglages.</div>
      <div class="field"><label class="field-label">Ton prénom</label><input type="text" id="onb-name" value="${escapeHtml(o.name)}" placeholder="Affiché sur l'écran d'accueil" onchange="readOnbInputs()"></div>
      <div class="field-row">
        <div class="field"><label class="field-label">Alerte entretien (km)</label><input id="onb-km" class="mono" inputmode="numeric" value="${o.warnKm}" onchange="readOnbInputs()"></div>
        <div class="field"><label class="field-label">Alerte entretien (h)</label><input id="onb-h" class="mono" inputmode="numeric" value="${o.warnHours}" onchange="readOnbInputs()"></div>
      </div>
      <div class="field"><label class="field-label">Alerte échéance (jours avant)</label><input id="onb-d" class="mono" inputmode="numeric" value="${o.warnDays}" onchange="readOnbInputs()"></div>`;
  } else if(s===2){
    const tip=(ic,t,sub)=>`<div class="onb-tip"><div class="onb-tip-ic">${ic}</div><div><div class="onb-tip-t">${t}</div><div class="onb-tip-s">${sub}</div></div></div>`;
    body = `<div class="onb-title">COMMENT ÇA MARCHE</div><div style="margin-top:18px;">
      ${tip(icon('tire','var(--accent)'),'Ajoute tes véhicules','Depuis le Garage. Avec ou sans marque ni immatriculation, suivi en km ou en heures.')}
      ${tip(icon('oil','var(--info)'),'Définis les préconisations','Ex : vidange tous les 10 000 km. Les rappels se calculent automatiquement.')}
      ${tip(icon('fuel','var(--accent)'),'Note tes pleins','Litres, distance et coût : tu suis la consommation et le budget carburant.')}
      ${tip(euroIcon('var(--ok)'),"Garde l'œil sur les coûts","L'onglet Finance regroupe dépenses, valeur du parc et coût au kilomètre.")}
      </div>`;
  } else {
    body = `<div class="onb-hero">${bigCheck}</div>
      <div class="onb-title">C'EST PARTI</div>
      <div class="onb-text">Tout est prêt. Commence par ajouter ton premier véhicule depuis le Garage.</div>`;
  }
  const dots = [0,1,2,3].map(i=>`<div class="onb-dot ${i===s?'on':''}"></div>`).join('');
  const last = s>=3;
  const prevBtn = s>0 ? `<button class="btn btn-secondary" onclick="onbPrev()">Précédent</button>` : '';
  const nextBtn = `<button class="btn btn-primary" onclick="onbNext()">${last?'Commencer':'Suivant'}</button>`;
  return `<div class="onb">
    <div class="onb-top">${last?'':`<button class="onb-skip" onclick="completeOnboarding()">Passer</button>`}</div>
    <div class="onb-body ${state.onbDir==='back'?'back':'fwd'}">${body}</div>
    <div class="onb-foot"><div class="onb-dots">${dots}</div><div class="btn-row" style="margin-top:0;">${prevBtn}${nextBtn}</div></div>
  </div>`;
}
function showOnboarding(){ const el=document.getElementById('onboarding'); if(el) el.innerHTML=renderOnboarding(); }
function readOnbInputs(){
  if(!state.onbSettings) return;
  const n=document.getElementById('onb-name'); if(n) state.onbSettings.name=n.value.trim();
  const km=document.getElementById('onb-km'); if(km) state.onbSettings.warnKm=Math.max(0,parseInt(String(km.value).replace(/\s/g,''),10)||0);
  const h=document.getElementById('onb-h'); if(h) state.onbSettings.warnHours=Math.max(0,parseInt(String(h.value).replace(/\s/g,''),10)||0);
  const d=document.getElementById('onb-d'); if(d) state.onbSettings.warnDays=Math.max(0,parseInt(String(d.value).replace(/\s/g,''),10)||0);
}
function onbNext(){ readOnbInputs(); state.onbDir='fwd'; if(state.onbSlide>=3){ completeOnboarding(); return; } state.onbSlide++; showOnboarding(); }
function onbPrev(){ readOnbInputs(); state.onbDir='back'; state.onbSlide=Math.max(0,state.onbSlide-1); showOnboarding(); }
function completeOnboarding(){
  readOnbInputs();
  const o = state.onbSettings || {};
  settings.name = o.name || '';
  if(o.warnKm!=null) settings.warnKm = o.warnKm;
  if(o.warnHours!=null) settings.warnHours = o.warnHours;
  if(o.warnDays!=null) settings.warnDays = o.warnDays;
  onboarded = true; state.onbSlide = 0; state.onbSettings = null;
  save(); state.tab='home'; state.vehicleId=null; render();
}

    <div class="stat"><div class="stat-icon" style="background:var(--accent-dim);"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2.6 7.6V3.4a1 1 0 0 1 1-1h4.1l5.9 5.9a1 1 0 0 1 0 1.4l-3.7 3.7a1 1 0 0 1-1.4 0L2.6 7.6z" stroke="var(--accent)" stroke-width="1.3" stroke-linejoin="round"/><circle cx="5.4" cy="5.4" r="1" fill="var(--accent)"/></svg></div><div class="stat-val">${forSale.length}</div><div class="stat-label">En vente</div></div>

function alertRow(a){
  const c = SC[a.st.s];
  return `<div class="row tap" onclick="openVehicle(${a.veh.id})">
    <div class="row-icon" style="background:${SD[a.st.s]};">${icon(a.type,c)}</div>
    <div class="row-body"><div class="row-name">${a.name}</div><div class="row-sub">${vehTitle(a.veh)} · ${a.veh.plate||catLabel(a.veh)}</div></div>
    <div class="row-meta"><span class="badge ${a.st.s}"><span class="dot"></span>${a.st.label}</span><div class="row-when" style="color:${c};">${a.short}</div></div>
  </div>`;
}

/* ── GARAGE ── */
function vehSearchText(v){ return [v.brand,v.model,v.name,v.plate,(v.tags||[]).join(' '),catLabel(v),v.fuel].filter(Boolean).join(' ').toLowerCase(); }
function filterVehicles(list){ const q=(state.garageSearch||'').trim().toLowerCase(); return q?list.filter(v=>vehSearchText(v).includes(q)):list; }
function sortVehicles(list){
  const by=state.garageSort||'alert'; const arr=[...list];
  if(by==='name') arr.sort((a,b)=>vehTitle(a).localeCompare(vehTitle(b)));
  else if(by==='value') arr.sort((a,b)=>(b.estValue||0)-(a.estValue||0));
  else { const rank=s=>s==='danger'?0:s==='warn'?1:2;
    arr.sort((a,b)=>{ const sa=vehicleStatus(a), sb=vehicleStatus(b); return rank(sa.s)-rank(sb.s) || (sb.alerts||0)-(sa.alerts||0) || vehTitle(a).localeCompare(vehTitle(b)); }); }
  return arr;
}
function garageControls(){
  const q=escapeHtml(state.garageSearch||'');
  const sorts=[['alert','Alerte'],['name','Nom'],['value','Valeur'],['tag','Étiquette']];
  return `<div class="garage-tools">
    <input id="garage-search" class="garage-search" placeholder="Rechercher (marque, modèle, plaque, étiquette…)" value="${q}" oninput="onGarageSearch(this.value)">
    <div class="chips" style="margin-top:8px;">${sorts.map(s=>`<div class="chip ${(state.garageSort||'alert')===s[0]?'active':''}" onclick="setGarageSort('${s[0]}')">${s[1]}</div>`).join('')}</div>
  </div>`;
}
function garageListHTML(grid){
  const wrap = items => grid ? `<div class="card-grid">${items}</div>` : items;
  const all = filterVehicles(vehicles);
  if((state.garageSort||'alert')==='tag'){
    const groups={}; const noTag=[];
    all.forEach(v=>{ if(v.tags&&v.tags.length) v.tags.forEach(t=>{ (groups[t]=groups[t]||[]).push(v); }); else noTag.push(v); });
    let html='';
    Object.keys(groups).sort((a,b)=>a.localeCompare(b)).forEach(t=>{
      const sorted=[...groups[t]].sort((a,b)=>vehTitle(a).localeCompare(vehTitle(b)));
      html += `<div class="sec-title">${escapeHtml(t)}</div>` + wrap(sorted.map(v=>vehicleCard(v)).join(''));
    });
    if(noTag.length){ const sorted=[...noTag].sort((a,b)=>vehTitle(a).localeCompare(vehTitle(b))); html += `<div class="sec-title">Sans étiquette</div>` + wrap(sorted.map(v=>vehicleCard(v)).join('')); }
    if(!html){ const q=(state.garageSearch||'').trim(); html = `<div class="empty">${q?'Aucun véhicule ne correspond.':'Aucun véhicule. Ajoute ton premier véhicule.'}</div>`; }
    return html;
  }
  const owned=sortVehicles(all.filter(v=>v.status==='owned'));
  const sale =sortVehicles(all.filter(v=>v.status==='for_sale'));
  const sold =sortVehicles(all.filter(v=>v.status==='sold'));
  let html='';
  if(owned.length) html += `<div class="sec-title">Mes véhicules</div>` + wrap(owned.map(v=>vehicleCard(v)).join(''));
  if(sale.length)  html += `<div class="sec-title">En vente</div>` + wrap(sale.map(v=>vehicleCard(v)).join(''));
  if(sold.length)  html += `<div class="sec-title">Vendus</div>` + wrap(sold.map(v=>vehicleCard(v)).join(''));
  if(!html){ const q=(state.garageSearch||'').trim(); html = `<div class="empty">${q?'Aucun véhicule ne correspond à la recherche.':'Aucun véhicule. Appuie sur + pour en ajouter un.'}</div>`; }
  return html;
}
function onGarageSearch(v){ state.garageSearch=v; const el=document.getElementById('garage-list'); if(el) el.innerHTML = garageListHTML(!isWide()); }
function setGarageSort(s){ state.garageSort=s; render(); }
function viewGarage(){
  let html = garageControls();
  html += `<div id="garage-list">${garageListHTML(true)}</div>`;
  html += addBtn('Ajouter un véhicule', "openModal('addVehicle')");
  return html;
}
function vehicleCard(v){
  const st = vehicleStatus(v);
  const badge = st.s==='sale' ? `<span class="badge sale"><span class="dot"></span>En vente</span>`
              : st.s==='sold' ? `<span class="badge sold">Vendu</span>`
              : `<span class="badge ${st.s}"><span class="dot"></span>${st.label}</span>`;
  const tag = v.plate ? `<div class="veh-plate">${v.plate.replaceAll('-','·')}</div>` : `<div class="veh-cat">${catLabel(v)}</div>`;
  const sel = state.vehicleId===v.id ? ' selected' : '';
  const tags = (v.tags&&v.tags.length) ? `<div class="veh-tags">${v.tags.map(t=>`<span class="tag-pill">${escapeHtml(t)}</span>`).join('')}</div>` : '';
  return `<div class="veh s-${st.s}${sel}">
    <div class="veh-head" onclick="openVehicle(${v.id})">
      <div><div class="veh-brand">${vehTitle(v)}</div><div class="veh-model">${vehSub(v)}</div>${tags}</div>
      <div class="veh-right">${tag}<button class="icon-del" onclick="event.stopPropagation();confirmDeleteVehicle(${v.id})" aria-label="Supprimer">${trashSvg}</button></div>
    </div>
    <div class="veh-stats" onclick="openVehicle(${v.id})">
      <div class="veh-stat"><div class="veh-stat-l">${unitName(v)}</div><div class="veh-stat-v">${fmt(v.usage)}</div></div>
      <div class="veh-stat"><div class="veh-stat-l">Carburant</div><div class="veh-stat-v">${v.fuel}</div></div>
      <div class="veh-stat"><div class="veh-stat-l">Statut</div><div style="margin-top:1px;">${badge}</div></div>
    </div>
  </div>`;
}

/* ── DETAIL ── */
function viewDetail(id){
  const v = byId(id); if(!v) return '';
  const st = vehicleStatus(v);
  const bc = v.status==='sold' ? 'var(--t3)' : (v.status==='for_sale' ? 'var(--accent)' : (SC[st.s]||'var(--accent)'));
  let html = `<div class="detail-hero" style="border-left-color:${bc};">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
      <div><div class="detail-brand">${vehTitle(v)}</div><div class="detail-model">${vehSub(v)}</div></div>
      ${v.status==='for_sale'?`<span class="badge sale"><span class="dot"></span>En vente</span>`:v.status==='sold'?`<span class="badge sold">Vendu</span>`:`<span class="badge ${st.s}"><span class="dot"></span>${st.label}</span>`}
    </div>
    <div class="detail-grid">
      ${v.plate?`<div class="detail-cell"><div class="detail-cell-l">Immatriculation</div><div class="detail-cell-v">${v.plate}</div></div>`:`<div class="detail-cell"><div class="detail-cell-l">Type</div><div class="detail-cell-v">${catLabel(v)}</div></div>`}
      <div class="detail-cell"><div class="detail-cell-l">${unitName(v)}</div><div class="detail-cell-v">${fmt(v.usage)} ${unitL(v)}</div></div>
      <div class="detail-cell"><div class="detail-cell-l">Carburant</div><div class="detail-cell-v">${v.fuel}</div></div>
      <div class="detail-cell"><div class="detail-cell-l">Prix d'achat</div><div class="detail-cell-v">${v.purchasePrice?fmtPrice(v.purchasePrice):'—'}</div></div>
      <div class="detail-cell"><div class="detail-cell-l">Valeur estimée</div><div class="detail-cell-v">${v.estValue?fmtPrice(v.estValue):'—'}</div></div>
      <div class="detail-cell"><div class="detail-cell-l">${v.status==='for_sale'?'Prix de vente':'Année'}</div><div class="detail-cell-v" style="${v.status==='for_sale'?'color:var(--accent);':''}">${v.status==='for_sale'?fmtPrice(v.salePrice):(v.year||'—')}</div></div>
    </div>
  </div>`;

  /* consommation / énergie */
  const avg = avgCons(v);
  const elec = isElectric(v); const eu = energyUnit(v);
  html += `<div class="sec-title">${elec?'Recharge':'Consommation'}</div>`;
  if(v.fuelLogs.length){
    const logs = [...v.fuelLogs].sort((a,b)=> new Date(b.date)-new Date(a.date));
    const totalL = v.fuelLogs.reduce((s,f)=>s+f.liters,0);
    html += `<div class="stat" style="padding:16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-end;">
      <div><div class="stat-label" style="margin:0 0 4px;">Moyenne · ${v.fuelLogs.length} ${elec?'recharge':'plein'}${v.fuelLogs.length>1?'s':''}</div><div class="stat-val">${avg.toFixed(1)}<span class="unit">${consUnit(v)}</span></div></div>
      <div style="text-align:right;"><div class="stat-label" style="margin:0 0 4px;">${elec?'Énergie totale':'Carburant total'}</div><div style="font-family:var(--f-data);font-size:15px;color:var(--t1);">${fmt(totalL)} ${eu}${fuelSpend(v)>0?` · ${fmtPrice(fuelSpend(v))}`:''}</div></div></div>`;
    const lf = latestFill(v);
    if(lf && fillAnomaly(lf,v)>0){
      html += `<div class="empty" style="border-style:solid;border-color:rgba(239,68,68,0.3);color:var(--danger);text-align:left;display:flex;gap:10px;align-items:center;margin-bottom:8px;"><svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M8 1.5l6.5 12h-13L8 1.5z" stroke="var(--danger)" stroke-width="1.3" stroke-linejoin="round"/><line x1="8" y1="6" x2="8" y2="9.5" stroke="var(--danger)" stroke-width="1.4" stroke-linecap="round"/><circle cx="8" cy="11.5" r="0.8" fill="var(--danger)"/></svg><span>Dernier ${elec?'plein':'plein'} en surconsommation (>${settings.warnConsPct}% au-dessus de la moyenne).</span></div>`;
    }
    html += logs.slice(0,3).map((f,i)=>fuelRow(v,f,logs,i)).join('');
    html += `<div style="text-align:right;margin-top:8px;"><span class="sec-link" onclick="openModal('fuelAll',{vehicleId:${v.id}})">${v.fuelLogs.length>3?`Voir ${elec?'toutes les recharges':'tous les pleins'} (${v.fuelLogs.length})`:'Voir le graphique'} →</span></div>`;
  } else { html += `<div class="empty">Aucun${elec?'e recharge enregistrée':' plein enregistré'}. Ajoute ${elec?'tes recharges':'tes pleins'} pour suivre la consommation.</div>`; }
  html += addBtn(elec?'Ajouter une recharge':'Ajouter un plein', `openModal('addFuel',{vehicleId:${v.id}})`);

  /* compteur (historique) */
  html += `<div class="sec-title">Compteur</div>`;
  html += usageSection(v);
  html += addBtn('Relever le compteur', `openModal('logUsage',{vehicleId:${v.id}})`);

  /* coût de possession */
  html += `<div class="sec-title">Coût de possession</div>`;
  html += tcoSection(v);

  /* entretiens / préconisations */
  html += `<div class="sec-title">Entretiens & préconisations</div>`;
  if(v.recos.length){
    html += v.recos.map(r=>{
      const rs = recoStatus(r,v); const c = SC[rs.s];
      return `<div class="row tap" onclick="openModal('recoActions',{vehicleId:${v.id},recoId:${r.id}})">
        <div class="row-icon" style="background:${SD[rs.s]};">${icon(r.type,c)}</div>
        <div class="row-body"><div class="row-name">${r.name}</div><div class="row-sub">${rs.detail}</div></div>
        <span class="badge ${rs.s}"><span class="dot"></span>${rs.label}</span>
      </div>`;
    }).join('');
  } else { html += `<div class="empty">Aucune préconisation. Ajoute-en une (ex : vidange tous les 10 000 km).</div>`; }
  html += addBtn('Ajouter une préconisation', `openModal('addReco',{vehicleId:${v.id}})`);

  /* historique */
  if(v.history.length){
    const hist = [...v.history].sort((a,b)=>new Date(b.date)-new Date(a.date));
    html += `<div class="sec-title">Historique des entretiens</div>`;
    html += hist.slice(0,3).map(h=>historyRow(v,h)).join('');
    html += `<div style="text-align:right;margin-top:8px;"><span class="sec-link" onclick="openModal('historyAll',{vehicleId:${v.id}})">${v.history.length>3?`Voir tout l'historique (${v.history.length})`:'Voir les dépenses'} →</span></div>`;
  }

  /* échéances */
  html += `<div class="sec-title">Échéances</div>`;
  if(v.deadlines.length){
    html += v.deadlines.map(d=>{
      const ds = deadlineStatus(d); const c = SC[ds.s];
      return `<div class="row tap" onclick="openModal('deadlineActions',{vehicleId:${v.id},deadlineId:${d.id}})">
        <div class="row-icon" style="background:${SD[ds.s]};">${icon('date',c)}</div>
        <div class="row-body"><div class="row-name">${d.name}</div><div class="row-sub">${ds.detail}</div></div>
        <span class="badge ${ds.s}"><span class="dot"></span>${ds.label}</span>
      </div>`;
    }).join('');
  } else { html += `<div class="empty">Aucune échéance enregistrée.</div>`; }
  html += addBtn('Ajouter une échéance', `openModal('addDeadline',{vehicleId:${v.id}})`);

  /* actions véhicule */
  html += `<div style="margin-top:24px;">`;
  html += `<button class="btn btn-secondary" onclick="openModal('editVehicle',{vehicleId:${v.id}})">${editSvg}Modifier le véhicule</button>`;
  html += `<button class="btn btn-secondary" style="margin-top:10px;" onclick="exportVehiclePdf(${v.id})"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 1.5h5l3 3V14a.5.5 0 0 1-.5.5h-7A.5.5 0 0 1 4 14V1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M9 1.5v3h3" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>Exporter en PDF</button>`;
  html += `<button class="btn btn-secondary" style="margin-top:10px;" onclick="openModal('saleListing',{vehicleId:${v.id}})"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2.6 7.6V3.4a1 1 0 0 1 1-1h4.1l5.9 5.9a1 1 0 0 1 0 1.4l-3.7 3.7a1 1 0 0 1-1.4 0L2.6 7.6z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="5.4" cy="5.4" r="1" fill="currentColor"/></svg>Générer une annonce de vente</button>`;
  if(v.status==='owned'){
    html += `<button class="btn btn-primary" style="margin-top:10px;" onclick="openModal('sell',{vehicleId:${v.id}})">Mettre en vente</button>`;
  } else if(v.status==='for_sale'){
    html += `<button class="btn btn-primary" style="margin-top:10px;" onclick="markSold(${v.id})">Marquer comme vendu</button><button class="btn btn-secondary" style="margin-top:10px;" onclick="cancelSale(${v.id})">Retirer de la vente</button>`;
  } else {
    html += `<div class="empty" style="border-style:solid;margin-top:10px;">Ce véhicule a été vendu${v.salePrice?` pour ${fmtPrice(v.salePrice)}`:''}.</div>`;
  }
  html += `<button class="btn btn-danger" style="margin-top:10px;" onclick="confirmDeleteVehicle(${v.id})">${trashSvg}Supprimer le véhicule</button></div>`;
  return html;
}

/* ── ECHEANCES ── */
function viewEcheances(){
  const alerts = allAlerts();
  if(!alerts.length) return `<div class="empty" style="margin-top:12px;">Aucune échéance à venir. Tout est à jour.</div>`;
  const danger = alerts.filter(a=>a.st.s==='danger'); const warn = alerts.filter(a=>a.st.s==='warn');
  let html = '';
  if(danger.length){ html += `<div class="sec-title" style="color:var(--danger);">En retard · ${danger.length}</div>` + danger.map(a=>alertRow(a)).join(''); }
  if(warn.length){ html += `<div class="sec-title" style="color:var(--warn);">À venir · ${warn.length}</div>` + warn.map(a=>alertRow(a)).join(''); }
  return html;
}

/* ── FINANCE ── */
function euroIcon(c){ return `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M11.5 4.6a4 4 0 1 0 0 6.8" stroke="${c}" stroke-width="1.4" stroke-linecap="round"/><path d="M3.4 7h6M3.4 9.2h5.2" stroke="${c}" stroke-width="1.4" stroke-linecap="round"/></svg>`; }
function viewFinance(){
  const all = vehicles;
  const active = vehicles.filter(v=>v.status!=='sold');
  const totalFuel = all.reduce((s,v)=>s+fuelSpend(v),0);
  const totalMaint = all.reduce((s,v)=>s+maintSpend(v),0);
  const total = totalFuel + totalMaint;
  const parcValue = active.reduce((s,v)=>s+(v.estValue||0),0);
  const invested = active.reduce((s,v)=>s+(v.purchasePrice||0),0);
  const diff = parcValue - invested;
  const avgPerVeh = active.length ? total/active.length : 0;

  let html = `<div class="stat-grid" style="margin-top:8px;">
    <div class="stat"><div class="stat-icon" style="background:var(--accent-dim);">${euroIcon('var(--accent)')}</div><div class="stat-val">${fmt(total)}<span class="unit">€</span></div><div class="stat-label">Dépenses totales</div></div>
    <div class="stat"><div class="stat-icon" style="background:var(--info-dim);">${icon('oil','var(--info)')}</div><div class="stat-val">${fmt(totalMaint)}<span class="unit">€</span></div><div class="stat-label">Entretien</div></div>
    <div class="stat"><div class="stat-icon" style="background:var(--accent-dim);">${icon('fuel','var(--accent)')}</div><div class="stat-val">${fmt(totalFuel)}<span class="unit">€</span></div><div class="stat-label">Carburant</div></div>
    <div class="stat"><div class="stat-icon" style="background:var(--ok-dim);">${euroIcon('var(--ok)')}</div><div class="stat-val">${fmt(parcValue/1000)}<span class="unit">k €</span></div><div class="stat-label">Valeur du parc</div></div>
  </div>`;

  const years = expenseYears();
  if(state.financeYear==null || !years.includes(state.financeYear)){ const cur=new Date().getFullYear(); state.financeYear = years.includes(cur)?cur:years[years.length-1]; }
  const yi = years.indexOf(state.financeYear);
  const yr = spendInYear(state.financeYear);
  const yrMap = {}; if(yr.maint>0) yrMap.maint=yr.maint; if(yr.fuel>0) yrMap.fuel=yr.fuel;
  html += `<div class="sec-title">Répartition des dépenses
    <span class="year-nav">
      <button class="year-arrow" onclick="financeYear(-1)" ${yi<=0?'disabled':''} aria-label="Année précédente">‹</button>
      <span class="year-cur">${state.financeYear}</span>
      <button class="year-arrow" onclick="financeYear(1)" ${yi>=years.length-1?'disabled':''} aria-label="Année suivante">›</button>
    </span></div>`;
  html += `<div class="stat" style="padding:16px;" ontouchstart="fySwipeStart(event)" ontouchend="fySwipeEnd(event)">${donutSVG(yrMap)}</div>`;

  html += `<div class="sec-title">Dépenses par véhicule</div>`;
  const rows = active.map(v=>({v, t:totalSpend(v), cpu:costPerUnit(v)})).sort((a,b)=>b.t-a.t);
  if(rows.some(r=>r.t>0)){
    html += rows.map(r=>{
      const cpu = r.cpu!=null ? `${r.cpu.toFixed(r.v.unit==='h'?1:2)} €/${unitL(r.v)}` : 'usage non suivi';
      const detail = `entretien ${fmt(maintSpend(r.v))} € · carburant ${fmt(fuelSpend(r.v))} € · ${cpu}`;
      return `<div class="row tap" onclick="openVehicle(${r.v.id})">
        <div class="row-icon" style="background:var(--bg-4);">${icon('tire','var(--t2)')}</div>
        <div class="row-body"><div class="row-name">${vehTitle(r.v)}</div><div class="row-sub">${detail}</div></div>
        <div style="font-family:var(--f-data);font-size:13px;color:var(--t1);">${fmtPrice(r.t)}</div>
      </div>`;
    }).join('');
  } else { html += `<div class="empty">Pas encore de dépense enregistrée par véhicule.</div>`; }

  html += `<div class="sec-title">Budget prévisionnel · 12 mois</div>`;
  const pj = projection12();
  if(pj.total>0){
    html += `<div class="stat" style="padding:16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-end;">
      <div><div class="stat-label" style="margin:0 0 4px;">Estimation sur 12 mois</div><div class="stat-val">${fmt(pj.total)}<span class="unit">€</span></div></div>
      <div style="text-align:right;"><div class="stat-label" style="margin:0 0 4px;">Soit par mois</div><div style="font-family:var(--f-data);font-size:15px;color:var(--t1);">${fmt(pj.monthly)} €</div></div></div>`;
    html += `<div class="detail-grid">
      <div class="detail-cell"><div class="detail-cell-l">Énergie (annualisée)</div><div class="detail-cell-v">${fmtPrice(pj.energyYear)}</div></div>
      <div class="detail-cell"><div class="detail-cell-l">Entretien (12 derniers mois)</div><div class="detail-cell-v">${fmtPrice(pj.maint12)}</div></div>
    </div>`;
    html += `<div style="font-size:11px;color:var(--t3);margin-top:8px;line-height:1.45;">Estimation basée sur tes dépenses passées : énergie ramenée à l'année et entretien des 12 derniers mois.</div>`;
  } else { html += `<div class="empty">Ajoute des pleins et des entretiens avec leur coût pour obtenir une projection.</div>`; }

  html += `<div class="sec-title">Patrimoine</div>
    <div class="detail-grid">
      <div class="detail-cell"><div class="detail-cell-l">Investi (achats)</div><div class="detail-cell-v">${fmtPrice(invested)}</div></div>
      <div class="detail-cell"><div class="detail-cell-l">Valeur estimée</div><div class="detail-cell-v">${fmtPrice(parcValue)}</div></div>
      <div class="detail-cell"><div class="detail-cell-l">Plus / moins-value</div><div class="detail-cell-v" style="color:${diff>=0?'var(--ok)':'var(--danger)'};">${diff>=0?'+':'−'}${fmtPrice(Math.abs(diff))}</div></div>
      <div class="detail-cell"><div class="detail-cell-l">Dépense moy. / véhicule</div><div class="detail-cell-v">${fmtPrice(avgPerVeh)}</div></div>
    </div>`;
  return html;
}

/* ── RÉGLAGES ── */
function viewProfil(){
  const active = vehicles.filter(v=>v.status!=='sold'); const sold = vehicles.filter(v=>v.status==='sold');
  const totalRecos = vehicles.reduce((s,v)=>s+v.recos.length,0);

/* ════════════ MODALS ════════════ */
function renderModal(){
  const m = document.getElementById('modal');
  if(!state.modal){ m.innerHTML=''; return; }
  let inner='';
  switch(state.modal){
    case 'confirm':         inner = modalConfirm(); break;
    case 'addVehicle':      inner = modalAddVehicle(); break;
    case 'editVehicle':     inner = modalEditVehicle(); break;
    case 'sell':            inner = modalSell(); break;
    case 'addReco':         inner = modalReco(false); break;
    case 'editReco':        inner = modalReco(true); break;
    case 'recoActions':     inner = modalRecoActions(); break;
    case 'markRecoDone':    inner = modalMarkDone(); break;
    case 'addDeadline':     inner = modalDeadline(false); break;
    case 'editDeadline':    inner = modalDeadline(true); break;
    case 'deadlineActions': inner = modalDeadlineActions(); break;
    case 'reportDeadline':  inner = modalReportDeadline(); break;
    case 'addFuel':         inner = modalFuel(false); break;
    case 'editFuel':        inner = modalFuel(true); break;
    case 'fuelActions':     inner = modalFuelActions(); break;
    case 'historyActions':  inner = modalHistoryActions(); break;
    case 'editHistory':     inner = modalEditHistory(); break;
    case 'historyAll':      inner = modalHistoryAll(); break;
    case 'fuelAll':         inner = modalFuelAll(); break;
    case 'export':          inner = modalExport(); break;
    case 'import':          inner = modalImport(); break;
    case 'logUsage':        inner = modalLogUsage(); break;
    case 'saleListing':     inner = modalSaleListing(); break;
    case 'choice':          inner = modalChoice(); break;
  }
  m.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-handle"></div>${inner}</div></div>`;
}

function modalConfirm(){

    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">Annuler</button><button class="btn ${c.danger?'btn-danger':'btn-primary'}" onclick="runConfirm()">${c.confirmLabel}</button></div>`;

function validateDeadline(vid, did){

/* fuel */
function saveFuel(){
  const v=byId(state.ctx.vehicleId); const liters=flt('f-liters'); const dist=num('f-dist'); const cost=flt('f-fcost'); const date=val('f-fdate')||todayISO();
  if(!liters||!dist){ toast('Renseigne la quantité et la distance.'); return; }
  v.fuelLogs.push({id:++nextId, date, liters, distance:dist, cost}); v.usage += dist;
  logUsage(v, v.usage, date);
  closeModal(); save(); render(); toast(isElectric(v)?'Recharge ajoutée':'Plein ajouté');
}
function saveEditFuel(){
  const v=byId(state.ctx.vehicleId); const f=v.fuelLogs.find(x=>x.id===state.ctx.fuelId);
  const liters=flt('f-liters'); const dist=num('f-dist'); const cost=flt('f-fcost'); const date=val('f-fdate')||f.date;
  if(!liters||!dist){ toast('Renseigne la quantité et la distance.'); return; }
  v.usage += (dist - f.distance); if(v.usage<0) v.usage=0;
  f.liters=liters; f.distance=dist; f.cost=cost; f.date=date;
  logUsage(v, v.usage, date);
  closeModal(); save(); render(); toast('Plein modifié');
}

/* fiche de vente */
function buildSaleListing(v){
  const u=unitL(v); const lines=[];
  const title = [v.brand, v.model].filter(x=>x&&x.trim()).join(' ') || (v.name||'').trim() || catLabel(v);
  lines.push(`${title}${v.year?` (${v.year})`:''}`.toUpperCase());
  lines.push('');
  if(v.salePrice||v.estValue) lines.push(`Prix : ${fmtPrice(v.salePrice||v.estValue)}`);
  lines.push(`${unitName(v)} : ${fmt(v.usage)} ${u}`);
  if(v.fuel) lines.push(`${isElectric(v)?'Énergie':'Carburant'} : ${v.fuel}`);
  if(v.plate) lines.push(`Immatriculation : ${v.plate}`);
  const avg=avgCons(v); if(avg!=null) lines.push(`Consommation moyenne : ${avg.toFixed(1)} ${consUnit(v)}`);
  lines.push('');
  if(v.history.length){
    lines.push('Entretien suivi :');
    [...v.history].sort((a,b)=> new Date(b.date)-new Date(a.date)).slice(0,6).forEach(h=>{
      lines.push(`- ${h.name} à ${fmt(h.doneAt)} ${h.unit} (${fmtDate(h.date)})`);
    });
    lines.push('');
  }
  const overdue = v.recos.filter(r=>recoStatus(r,v).s==='danger').length + v.deadlines.filter(d=>deadlineStatus(d).s==='danger').length;
  lines.push(overdue===0 ? 'Entretien à jour, aucune échéance en retard.' : 'Quelques entretiens à prévoir (voir avec moi).');
  lines.push('Suivi complet de l\'entretien disponible. N\'hésitez pas à me contacter pour plus d\'informations.');
  return lines.join('\n');
}
function saleCopy(){
  const ta=document.getElementById('sale-ta'); const data=ta?ta.value:'';
  const fb=()=>{ if(ta){ ta.focus(); ta.select(); try{document.execCommand('copy');}catch(e){} } toast('Copié'); };
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(data).then(()=>toast('Annonce copiée')).catch(fb); } else fb();
}

/* export */
function buildExport(){ return JSON.stringify({app:'PitStop Manager', version:3, exportedAt:new Date().toISOString(), settings, nextId, vehicles}, null, 2); }
function exportDownload(){
  try{
    const blob = new Blob([buildExport()], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='pitstop-manager-'+todayISO()+'.json';
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url), 1000);
    toast('Fichier exporté');
  }catch(e){ toast('Téléchargement bloqué — utilise Copier'); }
}
function exportCopy(){
  const data = buildExport();
  const fallback = ()=>{ const ta=document.getElementById('export-ta'); if(ta){ ta.focus(); ta.select(); try{document.execCommand('copy');}catch(e){} } toast('Copié'); };
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(data).then(()=>toast('Copié dans le presse-papier')).catch(fallback); }
  else fallback();
}

function exportVehiclePdf(id){
  const v = byId(id); if(!v) return;
  const u = unitL(v);
  const cons = avgCons(v);
  const th = 'text-align:left;padding:6px 8px;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#6b7280;border-bottom:1px solid #e5e7eb;';
  const td = 'padding:7px 8px;font-size:12px;border-bottom:1px solid #f0f1f3;';

  const hist = [...v.history].sort((a,b)=> new Date(b.date)-new Date(a.date));
