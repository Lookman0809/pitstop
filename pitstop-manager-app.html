  const dlLines = v.deadlines.length ? v.deadlines.map(d=>{ const ds=deadlineStatus(d); return `<tr><td style="${td}">${d.name}</td><td style="${td}">${fmtDate(d.date)}</td><td style="${td}">${ds.label}</td></tr>`; }).join('') : `<tr><td style="${td}" colspan="3">Aucune échéance</td></tr>`;
  const cell = (l,val)=>`<div style="border:1px solid #e5e7eb;border-radius:8px;padding:8px 10px;"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;">${l}</div><div style="font-size:13px;font-weight:600;margin-top:2px;">${val}</div></div>`;
  const cpu = costPerUnit(v);
  const sheet = `
    <div style="max-width:760px;margin:0 auto;">
      <div style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid #F0521A;padding-bottom:10px;margin-bottom:18px;">
        <div><div style="font-size:11px;letter-spacing:.12em;color:#F0521A;font-weight:700;">FICHE VÉHICULE</div>
        <div style="font-size:26px;font-weight:800;letter-spacing:.01em;">${vehTitle(v)}</div>
        <div style="font-size:13px;color:#6b7280;">${vehSub(v)}</div></div>
        <div style="text-align:right;font-size:11px;color:#9ca3af;">Édité le ${fmtDate(todayISO())}<br>PitStop Manager</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px;">
        ${cell('Type / immat.', v.plate || catLabel(v))}
        ${cell('Compteur', fmt(v.usage)+' '+u)}
        ${cell('Carburant', v.fuel)}
        ${cell("Prix d'achat", v.purchasePrice?fmtPrice(v.purchasePrice):'—')}
        ${cell('Valeur estimée', v.estValue?fmtPrice(v.estValue):'—')}
        ${cell('Année', v.year||'—')}
      </div>
      <h3 style="font-size:13px;margin:0 0 6px;">Consommation & coûts</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px;">
        ${cell('Conso moyenne', cons!=null?cons.toFixed(1)+' '+consUnit(v):'—')}
        ${cell('Carburant', fmtPrice(fuelSpend(v)))}
        ${cell('Entretien', fmtPrice(maintSpend(v)))}
        ${cell('Total dépensé', fmtPrice(totalSpend(v)))}
        ${cell('Coût / '+u, cpu!=null?cpu.toFixed(v.unit==='h'?1:2)+' €':'—')}
        ${cell('Distance suivie', fmt(distanceLogged(v))+' '+u)}
      </div>
      <h3 style="font-size:13px;margin:0 0 6px;">Préconisations</h3>
      <table style="width:100%;border-collapse:collapse;margin-bottom:18px;"><tr><th style="${th}">Entretien</th><th style="${th}">Statut</th><th style="${th}">Échéance</th></tr>${recoLines}</table>
      <h3 style="font-size:13px;margin:0 0 6px;">Historique des entretiens</h3>
      <table style="width:100%;border-collapse:collapse;margin-bottom:6px;"><tr><th style="${th}">Date</th><th style="${th}">Opération</th><th style="${th}">Compteur</th><th style="${th};text-align:right;">Coût</th></tr>${histLines}</table>
      <div style="text-align:right;font-size:12px;font-weight:700;margin-bottom:18px;">Total entretien : ${fmtPrice(maintSpend(v))}</div>
      <h3 style="font-size:13px;margin:0 0 6px;">Échéances</h3>
      <table style="width:100%;border-collapse:collapse;"><tr><th style="${th}">Échéance</th><th style="${th}">Date</th><th style="${th}">Statut</th></tr>${dlLines}</table>
    </div>`;
  const pa = document.getElementById('print-area');
  if(!pa) return;
  pa.innerHTML = sheet;

  window.print();

/* import des données (remplace le parc après confirmation) */
function applyImport(data){
  if(!data || !Array.isArray(data.vehicles)) { toast('Fichier invalide : aucun véhicule trouvé.'); return; }
  const count = data.vehicles.length;
  confirmDialog('Importer les données', `${count} véhicule(s) détecté(s). Tes données actuelles seront remplacées. Continuer ?`, 'Importer', ()=>{
    vehicles = data.vehicles;
    settings = Object.assign({name:'',warnKm:1500,warnHours:10,warnDays:30}, data.settings||{});
    nextId = data.nextId || 600;
    migrate();
    // garantit un nextId supérieur à tous les ids présents
    let maxId = 0;
    vehicles.forEach(v=>{ maxId=Math.max(maxId, v.id||0); ['recos','history','deadlines','fuelLogs'].forEach(k=>(v[k]||[]).forEach(x=>maxId=Math.max(maxId, x.id||0))); });
    if(nextId <= maxId) nextId = maxId + 1;
    save(); state.tab='garage'; state.vehicleId=null; render(); toast('Données importées');
  });
}
function parseImport(raw){
  try{ return JSON.parse(raw); }
  catch(e){ toast('JSON illisible : vérifie le contenu collé.'); return null; }
}
function importFromText(){
  const raw = val('import-ta');
  if(!raw){ toast('Colle le contenu JSON ou choisis un fichier.'); return; }
  const data = parseImport(raw); if(data) applyImport(data);
}
function importFromFile(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file){ return; }
  const reader = new FileReader();
  reader.onload = () => { const data = parseImport(String(reader.result)); if(data) applyImport(data); };
  reader.onerror = () => toast('Lecture du fichier impossible.');
  reader.readAsText(file);
}


/* ════════════ SYNCHRONISATION (dépôt GitHub privé) ════════════ */
let _pushTimer = null;
let _syncing = false;
let _pendingPush = false;

function syncConfigured(){ return !!(sync.repo && sync.token); }
function syncReady(){ return sync.enabled && syncConfigured(); }
function syncDataBlob(){ return { app:'PitStop Manager', version:3, dataUpdatedAt, exportedAt:new Date().toISOString(), settings, nextId, onboarded, vehicles }; }

function strToB64(str){ const bytes=new TextEncoder().encode(str); let bin=''; bytes.forEach(b=>bin+=String.fromCharCode(b)); return btoa(bin); }
function b64ToStr(b64){ const bin=atob(String(b64).replace(/\s/g,'')); const bytes=Uint8Array.from(bin, c=>c.charCodeAt(0)); return new TextDecoder().decode(bytes); }

function ghApiUrl(){
  const repo = sync.repo.trim().replace(/^https?:\/\/github\.com\//,'').replace(/\.git$/,'').replace(/\/+$/,'');
  return `https://api.github.com/repos/${repo}/contents/backup.json`;
}
function ghHeaders(){ return { 'Authorization':'Bearer '+sync.token.trim(), 'Accept':'application/vnd.github+json', 'X-GitHub-Api-Version':'2022-11-28' }; }

/* Récupère le fichier distant : {found, sha, blob} ou lève une erreur */
async function ghFetchRemote(){
  const res = await fetch(ghApiUrl()+'?ref=HEAD&t='+Date.now(), { headers: ghHeaders(), cache:'no-store' });
  if(res.status===404) return { found:false, sha:null, blob:null };
  if(res.status===401) throw new Error('Token refusé (401). Vérifie le token.');
  if(res.status===403) throw new Error('Accès interdit (403). Droits du token ?');
  if(!res.ok) throw new Error('Erreur GitHub ('+res.status+').');
  const j = await res.json();
  let blob=null; try{ blob = JSON.parse(b64ToStr(j.content)); }catch(e){ blob=null; }
  return { found:true, sha:j.sha, blob };
}
/* Écrit le fichier distant avec le sha courant (création si absent) */
async function ghPutRemote(sha){
  const body = { message:'PitStop sync '+new Date().toISOString(), content: strToB64(JSON.stringify(syncDataBlob(), null, 2)) };
  if(sha) body.sha = sha;
  const res = await fetch(ghApiUrl(), { method:'PUT', headers: Object.assign({'Content-Type':'application/json'}, ghHeaders()), body: JSON.stringify(body) });
  if(res.status===409) throw new Error('conflict');
  if(!res.ok) throw new Error('Envoi refusé ('+res.status+').');
  return true;
}

/* Pousse les données locales vers le dépôt (last-write-wins) */
async function syncPush(silent){
  if(!syncReady() || _syncing) { if(!syncReady()) return; _pendingPush=true; return; }
  if(typeof navigator!=='undefined' && navigator.onLine===false){ _pendingPush=true; return; }
  _syncing = true;
  try{
    let remote = await ghFetchRemote();
    await ghPutRemote(remote.sha);
    sync.lastSync = Date.now(); sync.lastError=''; _pendingPush=false; persist();
    if(!silent) toast('Sauvegarde en ligne à jour');
    renderSyncStatus();
  }catch(e){
    if(e.message==='conflict'){ try{ const r=await ghFetchRemote(); await ghPutRemote(r.sha); sync.lastSync=Date.now(); sync.lastError=''; _pendingPush=false; persist(); renderSyncStatus(); }catch(e2){ sync.lastError=e2.message; _pendingPush=true; persist(); renderSyncStatus(); } }
    else { sync.lastError = e.message; _pendingPush=true; persist(); if(!silent) toast('Synchro impossible : '+e.message); renderSyncStatus(); }
  }finally{ _syncing=false; flushPending(); }
}

/* Récupère la version en ligne et l'applique si elle est plus récente */
async function syncPull(silent){
  if(!syncReady() || _syncing) return;
  if(typeof navigator!=='undefined' && navigator.onLine===false) return;
  _syncing = true;
  try{
    const remote = await ghFetchRemote();
    if(remote.found && remote.blob && Array.isArray(remote.blob.vehicles)){
      const remoteAt = remote.blob.dataUpdatedAt || 0;
      if(remoteAt > dataUpdatedAt){
        applyRemoteBlob(remote.blob);
        sync.lastSync = Date.now(); sync.lastError=''; persist();
        render();
        if(!silent) toast('Données récupérées depuis le cloud');
      } else {
        sync.lastSync = Date.now(); sync.lastError=''; persist(); renderSyncStatus();
        if(!silent) toast('Déjà à jour');
        if(dataUpdatedAt > remoteAt) _pendingPush=true;
      }
    } else if(!remote.found){
      if(!silent) toast('Aucune sauvegarde en ligne — envoi des données locales');
      _pendingPush=true;
    }
  }catch(e){ sync.lastError=e.message; persist(); if(!silent) toast('Récupération impossible : '+e.message); renderSyncStatus(); }
  finally{ _syncing=false; flushPending(); }
}

/* Renvoie un push en attente une fois le verrou libéré et la connexion dispo */
function flushPending(){
  if(_pendingPush && syncReady() && !_syncing && !(typeof navigator!=='undefined' && navigator.onLine===false)){
    setTimeout(()=>syncPush(true), 60);
  }
}

function applyRemoteBlob(blob){
  vehicles = blob.vehicles || [];
  settings = Object.assign({name:'',warnKm:1500,warnHours:10,warnDays:30,warnConsPct:25}, blob.settings||{});
  nextId = blob.nextId || 600;
  if(typeof blob.onboarded==='boolean') onboarded = blob.onboarded;
  dataUpdatedAt = blob.dataUpdatedAt || Date.now();
  migrate();
  let maxId=0; vehicles.forEach(v=>{ maxId=Math.max(maxId, v.id||0); ['recos','history','deadlines','fuelLogs','usageLog'].forEach(k=>(v[k]||[]).forEach(x=>maxId=Math.max(maxId, x.id||0))); });
  if(nextId<=maxId) nextId=maxId+1;
  persist();
}

/* Envoi auto, temporisé, après chaque modification */
function schedulePush(){
  if(!syncReady()) return;
  if(_pushTimer) clearTimeout(_pushTimer);
  _pushTimer = setTimeout(()=>{ _pushTimer=null; syncPush(true); }, 1800);
}

/* À l'ouverture : récupère la version en ligne si plus récente */
function syncOnStartup(){ if(syncReady()) setTimeout(()=>syncPull(true), 300); }

/* Reprise quand la connexion revient */
if(typeof window!=='undefined'){
  window.addEventListener('online', ()=>{ if(syncReady() && _pendingPush) syncPush(true); });
}

/* ─ Réglages : actions de synchro ─ */
function renderSyncStatus(){
  const el = document.getElementById('sync-status'); if(!el) return;
  el.innerHTML = syncStatusHtml();
}
function syncStatusHtml(){
  if(!syncConfigured()) return `<span style="color:var(--t3);">Non configurée</span>`;
  const when = sync.lastSync ? fmtDateTime(sync.lastSync) : 'jamais';
  if(sync.lastError) return `<span style="color:var(--danger);">Erreur : ${escapeHtml(sync.lastError)}</span><br><span style="color:var(--t3);">Dernière synchro : ${when}</span>`;
  const state_ = sync.enabled ? '<span style="color:var(--ok);">Activée</span>' : '<span style="color:var(--t3);">En pause</span>';
  return `${state_} · dernière synchro : ${when}`;
}
function fmtDateTime(ms){ const d=new Date(ms); return d.toLocaleDateString('fr-FR')+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }

function saveSyncField(k, v){ sync[k]=v.trim(); persist(); }
async function activateSync(){
  sync.repo = val('sync-repo').trim(); sync.token = val('sync-token').trim();
  if(!sync.repo || !sync.token){ toast('Renseigne le dépôt et le token.'); return; }
  sync.lastError=''; persist(); toast('Connexion en cours…');
  try{
    const remote = await ghFetchRemote();
    if(remote.found && remote.blob && Array.isArray(remote.blob.vehicles) && remote.blob.vehicles.length){
      const here = vehicles.length;
      choiceDialog('Sauvegarde en ligne trouvée',
        `Le dépôt contient déjà ${remote.blob.vehicles.length} véhicule(s). Cet appareil en a ${here}. Que veux-tu utiliser ?`,
        'Récupérer le cloud (écrase l\'appareil)',
        ()=>{ applyRemoteBlob(remote.blob); sync.enabled=true; sync.lastSync=Date.now(); persist(); render(); toast('Synchronisation activée (données du cloud)'); },
        'Garder l\'appareil (écrase le cloud)',
        ()=>{ sync.enabled=true; persist(); syncPush(false); render(); toast('Synchronisation activée (données de l\'appareil)'); }
      );
    } else {
      sync.enabled=true; persist(); await syncPush(false); render(); toast('Synchronisation activée');
    }
  }catch(e){ sync.lastError=e.message; persist(); toast('Échec : '+e.message); renderSyncStatus(); }
}
function disableSync(){
  confirmDialog('Désactiver la synchronisation', 'Tes données restent sur l\'appareil et dans le dépôt, mais ne seront plus synchronisées automatiquement.', 'Désactiver', ()=>{
    sync.enabled=false; persist(); render(); toast('Synchronisation désactivée');
  });
}
function syncNow(){ if(!syncConfigured()){ toast('Configure d\'abord la synchro.'); return; } toast('Synchronisation…'); syncPull(false); }

window.addEventListener('resize', onResize);
if('serviceWorker' in navigator){ window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); }); }
load();
render();
syncOnStartup();
</script>
